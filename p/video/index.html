<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>限定動画講座 | 助産師ちる</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Klee One', 'Hiragino Kaku Gothic ProN', sans-serif;
    margin: 0;
    padding: 0;
    color: #4a3a3a;
    background-image: url('/images/scene_001.jpg'); 
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    line-height: 1.8;
  }
  .bg-overlay {
    background: rgba(255, 255, 255, 0.85);
    min-height: 100vh;
    padding: 50px 20px;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid rgba(255,255,255,0.9);
    backdrop-filter: blur(5px);
  }
  h1 {
    font-size: 24px;
    text-align: center;
    color: #3A3A3A;
    margin-bottom: 30px;
    border-bottom: 2px solid #D47A7A;
    padding-bottom: 15px;
  }
  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 */
    height: 0;
    overflow: hidden;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    background: #000;
  }
  .video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  @media (max-width: 600px) {
    .container { padding: 25px 15px; }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="bg-overlay">
  <div class="container">
    <h1>🎁 限定動画講座</h1>
    
    <div class="video-wrapper">
      <!-- vimeoなどの埋め込みコードをここに -->
      <iframe src="" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
    </div>
    
    <div style="text-align: center; margin-top: 40px; background: #fff; padding: 20px; border-radius: 8px; border: 1px dashed #D47A7A;">
      <p style="font-weight: 600; color: #C25555; margin: 0;">※ここは動画視聴ページの仮枠です。</p>
      <p style="font-size: 0.9em; margin: 5px 0 0 0;">VimeoのURLを教えていただければ、すぐに動画を埋め込みます！</p>
    </div>
  </div>
</div>
</body>
</html>
