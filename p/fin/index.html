<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>募集は終了しました | 助産師ちる</title>
<meta name="description" content="ウテロケア完全攻略プログラムの募集は終了しました。次回募集の情報をいち早くお届けします。">
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }

  body {
    font-family: 'Klee One', 'Hiragino Kaku Gothic ProN', sans-serif;
    color: #4a3a3a;
    background-image: url('/images/scene_003.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    line-height: 1.8;
  }

  .bg-overlay {
    background: rgba(255, 255, 255, 0.85);
    min-height: 100vh;
    padding: 50px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    padding: 50px 40px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    text-align: center;
  }

  h1, h2, h3, p, li {
    text-shadow:
      1px 1px 0px #fff, -1px -1px 0px #fff,
      1px -1px 0px #fff, -1px 1px 0px #fff,
      0px 1px 0px #fff, 0px -1px 0px #fff,
      1px 0px 0px #fff, -1px 0px 0px #fff,
      0px 0px 6px rgba(255, 255, 255, 0.8);
  }

  /* --- End Icon --- */
  .end-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D4A574, #C08B5C);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 25px;
    box-shadow: 0 4px 15px rgba(192, 139, 92, 0.3);
    animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .end-icon svg {
    width: 36px;
    height: 36px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* --- Heading --- */
  h1 {
    font-size: 26px;
    color: #3A3A3A;
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .subtitle {
    color: #C08B5C;
    font-weight: 600;
    font-size: 1.05em;
    margin-bottom: 30px;
  }

  /* --- Message Box --- */
  .message-box {
    background: rgba(255, 255, 255, 0.8);
    padding: 28px 30px;
    border-radius: 12px;
    border: 1px solid #E8D5C4;
    margin-bottom: 30px;
    text-align: left;
  }
  .message-box p {
    margin: 12px 0;
    font-size: 15px;
  }
  .message-box .thanks {
    color: #C08B5C;
    font-weight: 600;
    font-size: 1.05em;
  }

  /* --- Divider --- */
  .section-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #D4A574, #C08B5C);
    margin: 30px auto;
    border-radius: 2px;
  }

  /* --- Next Info --- */
  .next-info {
    background: rgba(255, 255, 255, 0.85);
    border: 2px dashed #D4A574;
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 30px;
  }
  .next-info h2 {
    color: #C08B5C;
    font-size: 20px;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .next-info p {
    font-size: 14px;
    color: #555;
    margin: 8px 0;
  }


  /* --- Profile Mini --- */
  .profile-mini {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-top: 30px;
    padding-top: 25px;
    border-top: 1px solid rgba(212, 165, 116, 0.25);
  }
  .profile-mini-img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: url('/images/chill_profile.png') center center / 135% no-repeat;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  .profile-mini-text {
    text-align: left;
    font-size: 0.9em;
  }
  .profile-mini-text strong {
    color: #C08B5C;
  }

  /* --- Footer --- */
  footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 12px;
    color: #999;
    border-top: 1px solid #eee;
    margin-top: 40px;
  }
  footer a {
    color: #999;
    text-decoration: none;
    margin: 0 12px;
  }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    .bg-overlay { padding: 30px 16px; }
    .container { padding: 35px 20px; }
    h1 { font-size: 22px; }
    .message-box { padding: 22px 18px; }
    .next-info { padding: 22px 18px; }
    .lp-link { padding: 14px 34px; font-size: 15px; }
    body { background-attachment: scroll; }
  }
</style>
</head>
<body>
<div class="bg-overlay">
  <main class="container">

    <div class="end-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>

    <h1>募集は終了しました</h1>
    <p class="subtitle">ウテロケア完全攻略プログラム</p>

    <div class="message-box">
      <p class="thanks">たくさんのお申し込みありがとうございました。</p>
      <p>本プログラムへの募集は締め切りとなりました。</p>
      <p>ご検討いただいていた方には大変申し訳ございませんが、次回の募集をお待ちいただければ幸いです。</p>
    </div>

    <div class="section-divider"></div>

    <div class="next-info">
      <h2>次回の募集について</h2>
      <p>次回募集の際は、メールにてご案内いたします。</p>
      <p>楽しみにお待ちいただけたら嬉しいです。</p>
    </div>

    <div class="profile-mini">
      <div class="profile-mini-img"></div>
      <div class="profile-mini-text">
        <strong>助産師 ちる</strong><br>
        またお会いできることを楽しみにしています。
      </div>
    </div>

  </main>
</div>
<footer>
  <a href="https://www.cross-over-airline.com/tokusyoho/" target="_blank">特定商取引法に基づく表記</a>｜<a href="https://www.cross-over-airline.com/privacy/" target="_blank">プライバシーポリシー</a>
  <p style="margin-top:8px">© 助産師ちる</p>
</footer>
</body>
</html>
